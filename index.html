<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="INSPIRE" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <!-- WAJIB: ikon iPhone (taruh file apple-touch-icon.png di ROOT repo) -->
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=2" />
  <link rel="apple-touch-icon-precomposed" href="apple-touch-icon.png?v=2" />

  <title>INSPIRE</title>

  <style>
    body { font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial; padding:24px; line-height:1.5; }
    .btn { display:inline-block; padding:12px 16px; border-radius:12px; border:1px solid #ddd; text-decoration:none; }
    .muted { opacity:.7; font-size:14px; }
  </style>
</head>
<body>
  <h2>INSPIRE – HCGA & Legal</h2>
  <p class="muted">iPhone: buka via Safari → Share → Add to Home Screen (jangan klik buka portal sebelum add to home screen).</p>

  <p><a class="btn" href="https://sites.google.com/view/hcgalegalcenter/home">Buka Portal</a></p>

  <script>
    const TARGET = "https://sites.google.com/view/hcgalegalcenter/home";
    const isStandalone =
      (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches) ||
      window.navigator.standalone === true;

    // Redirect hanya saat dibuka dari ikon Home Screen
    if (isStandalone) window.location.replace(TARGET);
  </script>
</body>
</html>
